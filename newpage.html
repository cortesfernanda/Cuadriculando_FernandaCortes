<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencia de Juego - Cuadriculando</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="stylesheet" href="newpage.css">
</head>
<body>

    <div class="bg-container" id="backgroundLiquido">
        <div class="bg-glow-layer">
            <div class="glow-bar bar-azul"></div>
            <div class="glow-bar bar-amarillo"></div>
            <div class="glow-bar bar-rojo"></div>
            <div class="glow-bar bar-verde"></div>
        </div>
    </div>

    <section class="hero-title-container" id="pantallaPortada">
        <nav class="navbar-local">
            <a href="index.html" class="btn-navbar">Inicio</a>
        </nav>

        <div class="cuadricula-fondo"></div>
        <h1 class="title-original texto-fondo">Cuadriculando</h1>
        
        <p id="textPista" class="pista-interactiva">Junta los cuadros para descubrir el camino</p>
        
        <button class="btn-comenzar hidden-start" id="btnComenzar">
            <span>Comenzar</span>
        </button>

        <div class="cuadrado-acrilico verde" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico azul" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico rojo" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico amarillo" data-arrastrando="false"></div>
    </section>

    <section class="prisma-section-light hidden-screen" id="prismaSection">
        <div class="cuadricula-fondo-clara" id="rejillaClara"></div>

        <div id="three-prisma-canvas"></div>



        <div class="menu-final-container hidden-menu" id="menuFinal">
            <button class="btn-sutil-opcion" id="btnSiguienteRecorrido">Seguir con el recorrido</button>
        </div>

        <button class="btn-sutil-fase" id="btnSiguienteSeccion" style="display: none; position: absolute; right: 40px; bottom: 50px; padding: 12px 28px; border-radius: 20px; z-index: 100;">
            <span>¿Seguir con el recorrido? ➔</span>
        </button>

        <!-- Botón flotante para finalizar en la Fase 4 (Laboratorio Óptico Rediseñado) -->
        <button class="btn-sutil-opcion btn-finalizar-flotante hidden-menu" id="btnFinalizarJuegoFlotante">Finalizar Recorrido</button>

        <!-- Overlay de victoria interactivo -->
        <div class="pantalla-victoria hidden-screen" id="pantallaVictoria">
            <div class="victoria-card">
                <div class="victoria-titulo" id="victoriaTitulo"></div>
                <div class="victoria-botones">
                    <button class="btn-sutil-opcion" id="btnIrInicio">Inicio Experimental</button>
                    <button class="btn-sutil-opcion" id="btnIrIndex">Página Principal</button>
                </div>
            </div>
        </div>
    </section>

    <script src="newpage.js"></script>
</body>
</html>
