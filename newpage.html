<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz expresiva - Cuadriculando</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="stylesheet" href="newpage.css?v=2.3">
</head>
<body class="page-fade-in">

    <div class="bg-container" id="backgroundLiquido">
        <div class="bg-glow-layer">
            <div class="glow-bar bar-azul"></div>
            <div class="glow-bar bar-amarillo"></div>
            <div class="glow-bar bar-rojo"></div>
            <div class="glow-bar bar-verde"></div>
        </div>
    </div>

    <section class="hero-title-container" id="pantallaPortada">
        <div class="pantalla-bg-glow-1"></div>
        <div class="pantalla-bg-glow-2"></div>
        <nav class="navbar-local">
            <a href="index.html" class="btn-navbar">Inicio</a>
        </nav>

        <div class="cuadricula-fondo"></div>
        <h1 class="title-original texto-fondo">Cuadriculando</h1>
        
        <p id="textPista" class="pista-interactiva">Junta los cuadros para descubrir el camino</p>
        
        <button class="btn-comenzar hidden-start" id="btnComenzar">
            <span>Comenzar</span>
        </button>

        <div class="cuadrado-acrilico verde" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico azul" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico rojo" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico amarillo" data-arrastrando="false"></div>
    </section>

    <section class="prisma-section-light hidden-screen" id="prismaSection">
        <div class="cuadricula-fondo-clara" id="rejillaClara"></div>
        
        <!-- Pista interactiva para la Fase 2 -->
        <p id="pistaFase2" class="pista-interactiva" style="opacity: 0; pointer-events: none; bottom: 80px; color: rgba(10, 10, 15, 0.6); transition: opacity 0.5s, color 0.5s; z-index: 35;"></p>

        <div id="three-prisma-canvas"></div>

        <div class="menu-final-container hidden-menu" id="menuFinal">
            <button class="btn-sutil-opcion" id="btnSiguienteRecorrido">Seguir con el recorrido</button>
        </div>

        <!-- Indicador de Clic Animado (Tutorial Simplificado) -->
        <div id="indicadorClic" class="indicador-clic-container" style="opacity: 0; pointer-events: none;">
            <div class="indicador-texto">Haz click en los cuadrados</div>
        </div>

        <!-- Botón flotante para finalizar en la Fase 4 (Laboratorio Óptico Rediseñado) -->
        <button class="btn-sutil-opcion btn-finalizar-flotante hidden-menu" id="btnFinalizarJuegoFlotante">Finalizar Recorrido</button>

        <!-- Overlay de victoria interactivo -->
        <div class="pantalla-victoria hidden-screen" id="pantallaVictoria">
            <div class="victoria-card">
                <div class="victoria-titulo" id="victoriaTitulo"></div>
                <div class="victoria-botones">
                    <button class="btn-sutil-opcion" id="btnIrInicio">Interfaz expresiva</button>
                    <button class="btn-sutil-opcion" id="btnIrIndex">Página Principal</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Pantalla de transición animada de salida -->
    <div id="transitionOverlay" class="transition-overlay">
        <div class="transition-squares-container">
            <div class="trans-square square-azul"></div>
            <div class="trans-square square-rojo"></div>
            <div class="trans-square square-amarillo"></div>
            <div class="trans-square square-verde"></div>
        </div>
    </div>

    <script src="newpage.js?v=4.0"></script>
</body>
</html>
