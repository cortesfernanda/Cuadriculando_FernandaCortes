<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencia de Juego - Cuadriculando</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="stylesheet" href="newpage.css">
</head>
<body>

    <div class="bg-container" id="backgroundLiquido">
        <div class="bg-glow-layer">
            <div class="glow-bar bar-azul"></div>
            <div class="glow-bar bar-amarillo"></div>
            <div class="glow-bar bar-rojo"></div>
            <div class="glow-bar bar-verde"></div>
        </div>
    </div>

    <section class="hero-title-container" id="pantallaPortada">
        <nav class="navbar-local">
            <a href="index.html" class="btn-navbar">Inicio</a>
        </nav>

        <div class="cuadricula-fondo"></div>
        <h1 class="title-original texto-fondo">Cuadriculando</h1>
        
        <p id="textPista" class="pista-interactiva">Junta los cuadros para descubrir el camino</p>
        
        <button class="btn-comenzar hidden-start" id="btnComenzar">
            <span>Comenzar</span>
        </button>

        <div class="cuadrado-acrilico verde" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico azul" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico rojo" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico amarillo" data-arrastrando="false"></div>
    </section>

    <section class="prisma-section-light hidden-screen" id="prismaSection">
        <div class="cuadricula-fondo-clara"></div>

        <div id="three-prisma-canvas"></div>

        <div class="star-trigger star-top hidden-star-trigger" data-target-layer="3">✦</div>
        <div class="star-trigger star-right hidden-star-trigger" data-target-layer="2">✦</div>
        <div class="star-trigger star-bottom hidden-star-trigger" data-target-layer="1">✦</div>
        <div class="star-trigger star-left hidden-star-trigger" data-target-layer="0">✦</div>

        <button class="btn-sutil-fase" id="btnRevelarBloque">
            <span>Descomponer bloque negro</span>
        </button>

        <div class="menu-final-container hidden-menu" id="menuFinal">
            <button class="btn-sutil-opcion" id="btnSiguienteRecorrido">Continuar recorrido</button>
            <button class="btn-sutil-opcion" id="btnReiniciarPrisma">Reiniciar</button>
        </div>

        <button class="btn-sutil-fase" id="btnSiguienteSeccion" style="display: none; position: absolute; right: 40px; bottom: 40px; padding: 12px 28px; border-radius: 20px; z-index: 100;">
            <span>¿Seguir con el recorrido? ➔</span>
        </button>

        <p class="instruccion-prisma" id="textoGuia">Un prisma denso absorbe la luz sobre la cuadrícula</p>
    </section>

    <script src="newpage.js"></script>
</body>
</html>
