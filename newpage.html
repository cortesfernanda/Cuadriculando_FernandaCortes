<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencia de Juego - Cuadriculando</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="newpage.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="btn-navbar">Inicio</a>
    </nav>

    <div class="bg-container">
        <div class="bg-glow-layer" id="glowLayer">
            <div class="glow-bar bar-azul"></div>
            <div class="glow-bar bar-amarillo"></div>
            <div class="glow-bar bar-rojo"></div>
            <div class="glow-bar bar-verde"></div>
        </div>
        <div class="bg-grid-layer" id="gridLayer"></div>
    </div>

    <section class="hero-title-container">
        <h1 class="title-original">Cuadriculando</h1>
    </section>

    <section class="scroll-section">
        <button class="btn-comenzar" id="btnComenzar">
            <span id="btnText">Comenzar</span>
        </button>
    </section>

    <section class="scroll-section" id="boardSection">
        <h2 class="section-instruction" id="instructionText">Elige un color</h2>
        <div class="innovative-selector" id="mainSelector">
            <div class="color-stripe stripe-azul" data-color="Azul"></div>
            <div class="color-stripe stripe-amarillo" data-color="Amarillo"></div>
            <div class="color-stripe stripe-rojo" data-color="Rojo"></div>
            <div class="color-stripe stripe-verde" data-color="Verde"></div>
        </div>
    </section>

    <section class="scroll-section section-pieces" id="piecesSection">
        <div class="board-container" id="boardContainer">
            <div class="personal-set" id="personalSet"></div>
        </div>

        <div class="interaction-controls" id="controlPanel">
            <button class="vector-control-btn" id="btnCircle" title="Modo Ondas">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="38"/></svg>
            </button>
            <button class="vector-control-btn" id="btnStar" title="Modo Constelación Lineal">
                <svg viewBox="0 0 100 100"><path d="M50,0 C50,35 65,50 100,50 C65,50 50,65 50,100 C50,65 35,50 0,50 C35,50 50,35 50,0 Z" fill="none"/></svg>
            </button>

            <div class="size-slider-container" id="sliderContainer">
                <span>Escala</span>
                <input type="range" id="sizeSlider" min="0.5" max="2.0" step="0.05" value="1">
            </div>
        </div>
    </section>

    <script src="newpage.js"></script>
</body>
</html>
