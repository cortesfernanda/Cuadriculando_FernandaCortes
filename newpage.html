<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencia de Juego - Cuadriculando</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="newpage.css">
</head>
<body>

    <div class="bg-container">
        <div class="bg-glow-layer" id="glowLayer">
            <div class="glow-bar bar-azul"></div>
            <div class="glow-bar bar-amarillo"></div>
            <div class="glow-bar bar-rojo"></div>
            <div class="glow-bar bar-verde"></div>
        </div>
        <div class="bg-grid-layer" id="gridLayer"></div>
    </div>

    <section class="hero-title-container" id="ambienteHero">
        
        <nav class="navbar-local">
            <a href="index.html" class="btn-navbar">Inicio</a>
        </nav>

        <div class="cuadricula-fondo"></div>
        
        <h1 class="title-original texto-fondo">Cuadriculando</h1>
        
        <p id="textPista" class="pista-interactiva">Junta los cuadros para descubrir el camino</p>
        
        <button class="btn-comenzar hidden-start" id="btnComenzar">
            <span id="btnText">Comenzar</span>
        </button>

        <div class="cuadrado-acrilico verde" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico azul" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico rojo" data-arrastrando="false"></div>
        <div class="cuadrado-acrilico amarillo" data-arrastrando="false"></div>
    </section>

    <section class="scroll-section" id="boardSection">
        
        <button class="btn-reset-puzzle" id="btnResetPuzzle">Reiniciar</button>

        <h2 class="section-instruction" id="instructionText">Elige un color</h2>
        
        <div class="glass-remote-container" id="remoteContainer">
            <div class="glass-remote-shuttle">
                <button class="remote-option option-amarillo" data-color="Amarillo"><span class="option-icon">✦</span></button>
                <button class="remote-option option-azul" data-color="Azul"><span class="option-icon">✦</span></button>
                <button class="remote-option option-rojo" data-color="Rojo"><span class="option-icon">✦</span></button>
                <button class="remote-option option-verde" data-color="Verde"><span class="option-icon">✦</span></button>
            </div>
        </div>

        <div class="puzzle-container hidden-puzzle" id="puzzleContainer">
            <div class="color-back option-amarillo-bg" id="backAmarillo"></div>
            <div class="color-back option-azul-bg" id="backAzul"></div>
            <div class="color-back option-rojo-bg" id="backRojo"></div>
            <div class="color-back option-verde-bg" id="backVerde"></div>
            
            <div class="cuadrado-negro-centro" id="btnNegroCentro">
                <span class="center-star">✦</span>
            </div>
        </div>

        <div class="nitidez-control-container" id="nitidezControl">
            <label for="blurSlider">Etapas de la materia</label>
            <input type="range" id="blurSlider" min="0" max="30" value="0" step="0.5">
        </div>
    </section>

    <script src="newpage.js"></script>
</body>
</html>
